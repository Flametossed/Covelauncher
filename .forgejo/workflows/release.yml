name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: codeberg-medium-lazy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends squashfs-tools jq

      - name: Install npm dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Linux packages
        run: npx electron-builder --linux AppImage tar.gz --publish never

      - name: Build Windows package
        run: npx electron-builder --win portable --publish never

      - name: List artifacts
        run: ls -la release/

      - name: Publish release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          TAG=${GITHUB_REF#refs/tags/}

          BODY=$(jq -rn \
            --arg tag "$TAG" \
            --arg name "CoveLauncher $TAG" \
            --arg body "## CoveLauncher $TAG\n\nA modern, lightweight Game Library Manager.\n\n### Downloads\n- **Windows**: Download the \`.exe\` file (portable — no installation needed)\n- **Linux AppImage**: Download the \`.AppImage\` file, then \`chmod +x\` and run\n- **Linux tar.gz**: Download and extract, then run the \`covelauncher\` binary" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://codeberg.org/api/v1/repos/${REPO}/releases")

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Release creation failed:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "Release created: $RELEASE_ID"

          for file in release/*.exe release/*.AppImage release/*.tar.gz; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$FILENAME")
            echo "Uploading: $FILENAME"
            curl -sf -X POST \
              -H "Authorization: token ${RELEASE_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "https://codeberg.org/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${ENCODED}"
            echo "Uploaded: $FILENAME"
          done
